services:
  postgres:
    image: postgis/postgis:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Carsharing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ../Database/dump.sql:/docker-entrypoint-initdb.d/dump.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-Carsharing}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  carsharing:
    build:
      context: ../
      dockerfile: Carsharing/Carsharing/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Staging}
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__CarsharingDbContext=Host=postgres;Port=5432;Database=${POSTGRES_DB:-Carsharing};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      - JwtOptions__SecretKey=${JWT_SECRET_KEY}
      - JwtOptions__ExpiresHours=${JWT_EXPIRES_HOURS:-12}
      - Minio__ServiceURL=${MINIO_SERVICE_URL:-http://minio:9000}
      - Minio__PublicURL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Minio__BucketName=${MINIO_BUCKET_NAME:-carsharing-images}
      - FileUpload__MaxCarImageBytes=${MAX_CAR_IMAGE_BYTES:-5242880}
      - FileUpload__MaxDocumentImageBytes=${MAX_DOCUMENT_IMAGE_BYTES:-10485760}
    ports:
      - "5078:80"
    volumes:
      - ./keys:/app/keys
      - images:/app/wwwroot/images
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  keys_storage:
  images:
  minio_data:
