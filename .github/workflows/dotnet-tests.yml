name: .NET Tests Pipeline

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore Carsharing/Carsharing.sln

    - name: Build
      run: dotnet build Carsharing/Carsharing.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test Carsharing/Carsharing.sln --no-build --configuration Release --verbosity normal